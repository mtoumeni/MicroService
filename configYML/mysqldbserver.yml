apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  labels:
    app: mydbserver
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mydbserver
    tier: mysql
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim
  labels:
    app: mydbserver
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-pass
type: Opaque
data:
  password: <your_password_in_BASE64>
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydbserver-mysql
  labels:
    app: mydbserver
spec:
  selector:
    matchLabels:
      app: mydbserver
      tier: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mydbserver
        tier: mysql
    spec:
      containers:
      - image: mysql
        name: mydbserver
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-pass
              key: password
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pv-claim
